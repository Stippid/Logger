
<style>
*{box-sizing:border-box;margin:0;padding:0}
.cal-wrap{font-family:var(--font-sans);padding:1.5rem 0;user-select:none}
.cal-top{display:flex;gap:24px;align-items:flex-start}
.cal-left{flex:1;min-width:0}
.cal-right{width:160px;flex-shrink:0;position:sticky;top:1rem}
.count-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem 1rem;text-align:center;transition:all 0.2s}
.count-card.has-sel{background:#EEEDFE;border-color:#AFA9EC}
.count-num{font-size:40px;font-weight:500;color:#3C3489;line-height:1;margin-bottom:6px;transition:all 0.2s}
.count-num.zero{color:var(--color-text-tertiary);font-size:32px}
.count-label{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.count-card.has-sel .count-label{color:#534AB7}
.mode-pill{margin-top:10px;font-size:11px;padding:4px 8px;border-radius:20px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-tertiary);transition:all 0.2s}
.mode-pill.ctrl{background:#FAEEDA;border-color:#FAC775;color:#854F0B}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-month-label{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.cal-year-label{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-primary);font-size:18px;transition:background 0.15s}
.nav-btn:hover{background:var(--color-background-tertiary)}

.cal-legend{display:flex;gap:14px;margin-bottom:1.25rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-pub{background:#7F77DD}.leg-sat{background:#1D9E75}.leg-sun{background:#E24B4A}.leg-sel{background:#378ADD}

.month-strip{display:flex;gap:5px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.month-chip{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s}
.month-chip.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.month-chip:hover:not(.active){background:var(--color-background-tertiary)}

.cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-day-name{text-align:center;font-size:10px;font-weight:500;color:var(--color-text-tertiary);padding:5px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}

.cal-cell{min-height:52px;border-radius:var(--border-radius-md);padding:6px 8px;position:relative;transition:background 0.1s,transform 0.1s,border-color 0.1s;border:0.5px solid transparent;cursor:pointer}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-cell.normal{background:var(--color-background-secondary);border-color:var(--color-border-tertiary)}
.cal-cell.normal:hover{background:var(--color-background-tertiary)}
.cal-cell.is-sunday{background:#FCEBEB;border-color:#F7C1C1}
.cal-cell.is-pub-holiday{background:#EEEDFE;border-color:#CECBF6}
.cal-cell.is-sat-holiday{background:#E1F5EE;border-color:#9FE1CB}
.cal-cell.is-today{border:1.5px solid #7F77DD !important}

.cal-cell.selected{background:#E6F1FB !important;border-color:#85B7EB !important}
.cal-cell.selected .day-num{color:#185FA5 !important}
.cal-cell.in-range{background:#EBF4FD !important;border-color:#B5D4F4 !important}
.cal-cell.drag-hover{background:#DDEEFA !important;border-color:#85B7EB !important}

.day-num{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1}
.cal-cell.is-sunday .day-num{color:#A32D2D}
.cal-cell.is-pub-holiday .day-num{color:#3C3489}
.cal-cell.is-sat-holiday .day-num{color:#085041}
.hol-tag{font-size:9px;font-weight:500;margin-top:3px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:#534AB7}
.cal-cell.is-sat-holiday .hol-tag{color:#0F6E56}
.hol-dot{width:5px;height:5px;border-radius:50%;background:#7F77DD;position:absolute;top:5px;right:7px}
.cal-cell.is-sat-holiday .hol-dot{background:#1D9E75}

.tooltip-box{position:fixed;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:10px 13px;font-size:12px;color:var(--color-text-primary);pointer-events:none;z-index:999;max-width:210px;box-shadow:0 8px 32px rgba(0,0,0,0.12);display:none;line-height:1.5}
.tooltip-title{font-weight:500;margin-bottom:3px}
.tooltip-sub{font-size:11px;color:var(--color-text-secondary)}
.tooltip-saka{font-size:10px;color:var(--color-text-tertiary);margin-top:3px}
</style>

<div class="cal-wrap">
<h2 class="sr-only">India General Holidays Calendar 2026 with date selection</h2>

<div class="cal-top">
  <div class="cal-left">
    <div class="cal-nav">
      <div>
        <div class="cal-month-label" id="calMonthLabel">January</div>
        <div class="cal-year-label">2026 · General Holidays</div>
      </div>
      <div class="nav-btns">
        <div class="nav-btn" onclick="prevMonth()" aria-label="Previous month">&#8249;</div>
        <div class="nav-btn" onclick="nextMonth()" aria-label="Next month">&#8250;</div>
      </div>
    </div>

    <div class="month-strip" id="monthStrip"></div>

    <div class="cal-legend">
      <div class="leg-item"><div class="leg-dot leg-pub"></div>Public holiday</div>
      <div class="leg-item"><div class="leg-dot leg-sat"></div>2nd / 4th Saturday</div>
      <div class="leg-item"><div class="leg-dot leg-sun"></div>Sunday</div>
      <div class="leg-item"><div class="leg-dot leg-sel"></div>Selected</div>
    </div>

    <div class="cal-grid-head">
      <div class="cal-day-name">Sun</div><div class="cal-day-name">Mon</div><div class="cal-day-name">Tue</div>
      <div class="cal-day-name">Wed</div><div class="cal-day-name">Thu</div><div class="cal-day-name">Fri</div>
      <div class="cal-day-name">Sat</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="cal-right">
    <div class="count-card" id="countCard">
      <div class="count-num zero" id="countNum">0</div>
      <div class="count-label" id="countLabel">days selected</div>
      <div class="mode-pill" id="modePill">Drag to select</div>
    </div>
  </div>
</div>

<div class="tooltip-box" id="tooltip"></div>
</div>

<script>
const HOLIDAYS = {
  "2026-01-14":{name:"Makar Sankranti",saka:"24 Paush, 1947",type:"pub"},
  "2026-01-26":{name:"Republic Day",saka:"06 Magh, 1947",type:"pub"},
  "2026-03-04":{name:"Holi 2nd Day – Dhuleti",saka:"13 Phalgun, 1947",type:"pub"},
  "2026-03-19":{name:"Chetichand",saka:"28 Phalgun, 1947",type:"pub"},
  "2026-03-21":{name:"Ramjan-Eid (Eid-Ul-Fitra) – 1st Shawaal",saka:"30 Phalgun, 1947",type:"pub"},
  "2026-03-26":{name:"Shree Ram Navmi",saka:"05 Chaitra, 1948",type:"pub"},
  "2026-03-31":{name:"Mahavir Janma Kalyanak",saka:"10 Chaitra, 1948",type:"pub"},
  "2026-04-03":{name:"Good Friday",saka:"13 Chaitra, 1948",type:"pub"},
  "2026-04-14":{name:"Dr. Baba Saheb Ambedkar's Birthday",saka:"24 Chaitra, 1948",type:"pub"},
  "2026-05-27":{name:"Eid-Ul-Adha (Bakri-Eid)",saka:"06 Jyestha, 1948",type:"pub"},
  "2026-06-26":{name:"Muharram (Ashoora)",saka:"05 Ashadh, 1948",type:"pub"},
  "2026-08-15":{name:"Independence Day",saka:"24 Shravan, 1948",type:"pub"},
  "2026-08-26":{name:"Eid-e-Meeladunnabi (Prophet Mohammad's Birthday)",saka:"04 Bhadrapad, 1948",type:"pub"},
  "2026-08-28":{name:"Raksha Bandhan",saka:"06 Bhadrapad, 1948",type:"pub"},
  "2026-09-04":{name:"Janmashtami (Shravan Vad-8)",saka:"13 Bhadrapad, 1948",type:"pub"},
  "2026-09-15":{name:"Samvatsari (Chaturthi Paksha)",saka:"24 Bhadrapad, 1948",type:"pub"},
  "2026-10-02":{name:"Mahatma Gandhi's Birthday",saka:"10 Ashwin, 1948",type:"pub"},
  "2026-10-20":{name:"Dusshera (Vijaya Dashmi)",saka:"28 Ashwin, 1948",type:"pub"},
  "2026-10-31":{name:"Sardar Vallabhbhai Patel's Birthday",saka:"09 Kartik, 1948",type:"pub"},
  "2026-11-10":{name:"Vikram Samvant New Year Day",saka:"19 Kartik, 1948",type:"pub"},
  "2026-11-11":{name:"Bhai Bij",saka:"20 Kartik, 1948",type:"pub"},
  "2026-11-24":{name:"Guru Nanak's Birthday",saka:"03 Margshirsh, 1948",type:"pub"},
  "2026-12-25":{name:"Christmas",saka:"04 Paush, 1948",type:"pub"},
};

function getSatHols(year, month) {
  const result = {}, sats = [];
  let d = new Date(year, month, 1);
  while(d.getMonth()===month){ if(d.getDay()===6) sats.push(new Date(d)); d.setDate(d.getDate()+1); }
  [sats[1],sats[3]].forEach(s=>{
    if(!s) return;
    const key=`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}`;
    if(!HOLIDAYS[key]) result[key]={name:"2nd/4th Saturday Holiday",saka:"",type:"sat"};
  });
  return result;
}

function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function keyToTs(key){ const[y,m,d]=key.split('-').map(Number); return new Date(y,m-1,d).getTime(); }

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const today=new Date();
let curYear=2026, curMonth=today.getMonth();

// Selection state
let selectedKeys = new Set();
let isDragging = false;
let dragStartKey = null;
let dragEndKey = null;
let ctrlMode = false;

function getRangeKeys(keyA, keyB){
  const tsA=keyToTs(keyA), tsB=keyToTs(keyB);
  const start=Math.min(tsA,tsB), end=Math.max(tsA,tsB);
  const keys=[];
  let cur=new Date(start);
  while(cur.getTime()<=end){
    keys.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`);
    cur.setDate(cur.getDate()+1);
  }
  return keys;
}

function updateCountUI(){
  const n = selectedKeys.size;
  const num = document.getElementById('countNum');
  const card = document.getElementById('countCard');
  const label = document.getElementById('countLabel');
  num.textContent = n;
  num.className = 'count-num' + (n===0?' zero':'');
  card.className = 'count-card' + (n>0?' has-sel':'');
  label.textContent = n===1 ? 'day selected' : 'days selected';
}

function updateModePill(){
  const pill = document.getElementById('modePill');
  if(ctrlMode){ pill.textContent='Ctrl — click to pick'; pill.className='mode-pill ctrl'; }
  else { pill.textContent='Drag to select'; pill.className='mode-pill'; }
}

function applySelectionClasses(){
  const rangeKeys = (!ctrlMode && isDragging && dragStartKey && dragEndKey)
    ? new Set(getRangeKeys(dragStartKey, dragEndKey)) : new Set();

  document.querySelectorAll('.cal-cell[data-key]').forEach(cell=>{
    const key = cell.dataset.key;
    cell.classList.remove('selected','in-range','drag-hover');
    if(selectedKeys.has(key)) cell.classList.add('selected');
    else if(rangeKeys.has(key)) cell.classList.add('drag-hover');
  });
}

function render(){
  document.getElementById('calMonthLabel').textContent = MONTHS[curMonth];
  const satHols = getSatHols(curYear, curMonth);
  const allHols = Object.assign({}, HOLIDAYS, satHols);
  const grid = document.getElementById('calGrid');
  grid.innerHTML='';

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const e=document.createElement('div'); e.className='cal-cell empty'; grid.appendChild(e);
  }

  for(let d=1;d<=daysInMonth;d++){
    const key = dateKey(curYear, curMonth, d);
    const date = new Date(curYear, curMonth, d);
    const isSun = date.getDay()===0;
    const hol = allHols[key];
    const isPub = hol&&hol.type==='pub';
    const isSat = hol&&hol.type==='sat';
    const isToday = (today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d);

    const cell=document.createElement('div');
    let cls='cal-cell';
    if(isPub) cls+=' is-pub-holiday';
    else if(isSat) cls+=' is-sat-holiday';
    else if(isSun) cls+=' is-sunday';
    else cls+=' normal';
    if(isToday) cls+=' is-today';
    if(selectedKeys.has(key)) cls+=' selected';
    cell.className=cls;
    cell.dataset.key=key;

    let inner=`<div class="day-num">${d}</div>`;
    if(hol){ inner+=`<div class="hol-tag">${hol.name}</div><div class="hol-dot"></div>`; }
    cell.innerHTML=inner;

    // Tooltip
    if(hol){
      cell.addEventListener('mouseenter',e=>showTip(e,hol,date));
      cell.addEventListener('mousemove',e=>moveTip(e));
      cell.addEventListener('mouseleave',hideTip);
    }

    // Drag / click events
    cell.addEventListener('mousedown', e=>{
      if(e.button!==0) return;
      if(ctrlMode){
        // Toggle individual date
        if(selectedKeys.has(key)) selectedKeys.delete(key);
        else selectedKeys.add(key);
        updateCountUI(); applySelectionClasses();
      } else {
        isDragging=true; dragStartKey=key; dragEndKey=key;
        applySelectionClasses();
      }
      e.preventDefault();
    });

    cell.addEventListener('mouseenter', ()=>{
      if(!ctrlMode && isDragging){ dragEndKey=key; applySelectionClasses(); }
    });

    grid.appendChild(cell);
  }

  // Month strip active
  document.querySelectorAll('.month-chip').forEach((c,i)=>c.classList.toggle('active',i===curMonth));
}

// Finish drag — commit range to selectedKeys
document.addEventListener('mouseup', e=>{
  if(!isDragging) return;
  if(dragStartKey && dragEndKey){
    getRangeKeys(dragStartKey, dragEndKey).forEach(k=>selectedKeys.add(k));
    updateCountUI();
  }
  isDragging=false; dragStartKey=null; dragEndKey=null;
  applySelectionClasses();
});

// Ctrl key tracking
document.addEventListener('keydown', e=>{ if(e.key==='Control'){ ctrlMode=true; updateModePill(); } });
document.addEventListener('keyup', e=>{ if(e.key==='Control'){ ctrlMode=false; updateModePill(); } });

// Click outside calendar clears selection
document.addEventListener('mousedown', e=>{
  const grid=document.getElementById('calGrid');
  const strip=document.getElementById('monthStrip');
  const navBtns=document.querySelectorAll('.nav-btn');
  let outside=!grid.contains(e.target)&&!strip.contains(e.target);
  navBtns.forEach(b=>{ if(b.contains(e.target)) outside=false; });
  if(outside && !e.target.closest('.cal-wrap')){
    selectedKeys.clear(); updateCountUI(); applySelectionClasses();
  }
});

function prevMonth(){ curMonth=curMonth===0?11:curMonth-1; render(); }
function nextMonth(){ curMonth=curMonth===11?0:curMonth+1; render(); }

function showTip(e,hol,date){
  const tip=document.getElementById('tooltip');
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][date.getDay()];
  const fmt=`${dayName}, ${date.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`;
  let html=`<div class="tooltip-title">${hol.name}</div><div class="tooltip-sub">${fmt}</div>`;
  if(hol.saka) html+=`<div class="tooltip-saka">Saka: ${hol.saka}</div>`;
  tip.innerHTML=html; tip.style.display='block'; moveTip(e);
}
function moveTip(e){
  const tip=document.getElementById('tooltip');
  let x=e.clientX+16, y=e.clientY+16;
  if(x+220>window.innerWidth) x=e.clientX-220;
  if(y+110>window.innerHeight) y=e.clientY-110;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){ document.getElementById('tooltip').style.display='none'; }

// Build month strip
const strip=document.getElementById('monthStrip');
MONTHS.forEach((m,i)=>{
  const c=document.createElement('div');
  c.className='month-chip'+(i===curMonth?' active':'');
  c.textContent=m;
  c.onclick=()=>{ curMonth=i; render(); };
  strip.appendChild(c);
});

render();
updateModePill();
</script>
