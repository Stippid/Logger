<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logoV3.png">

    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="/socket.io/socket.io.js"></script> <!-- Served automatically by your Node backend -->

    <style>
        :root { 
            --bg: #f9f9f9; --text: #333; --border: #e0e0e0; --accent: #000; --danger: #dc3545; --surface: #fff; --highlight: #ffeb3b; --highlight-text: #000;
            --heat-1: #c6c6c6; --heat-2: #8c8c8c; --heat-3: #525252; --heat-4: #000000;
        }
        body.dark-mode {
            --bg: #121212; --text: #e0e0e0; --border: #333; --accent: #fff; --danger: #ff4d4d; --surface: #1e1e1e; --highlight: #b3b300; --highlight-text: #fff;
            --heat-1: #555555; --heat-2: #888888; --heat-3: #bbbbbb; --heat-4: #ffffff;
        }
        
        body { font-family: 'Fira Mono', monospace; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* Header & Profile */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h2 { margin: 0; font-weight: 500; }
        .profile-section { position: relative; }
        .profile-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .dropdown { display: none; position: absolute; right: 0; top: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 150px; overflow: hidden; z-index: 10; }
        .dropdown.active { display: block; }
        .dropdown button { width: 100%; text-align: left; background: none; color: var(--text); border: none; padding: 10px 15px; border-radius: 0; cursor: pointer; font-family: inherit; }
        .dropdown button:hover { background: var(--bg); }

        /* Tabs */
        .badge { background: var(--danger); color: #fff; border-radius: 10px; padding: 2px 6px; font-size: 10px; font-weight: bold; margin-left: 5px; display: inline-block; }
        .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; overflow-x: auto;}
        .tab-btn { background: transparent; color: var(--text); border: none; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 16px; font-weight: 500; opacity: 0.6; transition: opacity 0.2s; white-space: nowrap;}
        .tab-btn:hover { opacity: 1; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent); font-weight: bold; }

        /* Forms & Buttons */
        textarea, input[type="text"], input[type="password"] { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; background: var(--surface); color: var(--text); }
        textarea { height: 120px; resize: vertical; }
        textarea:focus, input:focus { outline: none; border-color: var(--accent); }
        button { background: var(--accent); color: var(--bg); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; transition: opacity 0.2s; }
        button:hover:not(:disabled) { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--surface); color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; font-size: 12px;}
        .btn-edit { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; font-size: 12px;}
        .controls { display: flex; justify-content: space-between; margin-bottom: 40px; gap: 10px; }

        /* Logger & Heatmap */
        .accordion { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; user-select: none; transition: background 0.2s; }
        .accordion-header:hover { background: var(--bg); }
        .accordion-content { display: none; padding: 20px; border-top: 1px solid var(--border); }
        .accordion-content.active { display: block; }
        .year-selector { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; font-weight: bold; }
        .btn-small { padding: 5px 10px; font-size: 12px; }
        .heatmap-year-container { display: flex; justify-content: space-between; width: 100%; overflow-x: auto; padding-bottom: 10px;}
        .heatmap-month { display: grid; grid-template-rows: repeat(7, 10px); grid-auto-flow: column; gap: 2px; }
        .heat-cell { width: 10px; height: 10px; border-radius: 2px; background-color: var(--border); cursor: pointer; transition: transform 0.1s; }
        .heat-cell:hover { transform: scale(1.3); z-index: 2; position: relative; }
        .heat-cell.empty { background-color: transparent; cursor: default; }
        .heat-cell.empty:hover { transform: none; }
        .heat-cell[data-level="1"] { background-color: var(--heat-1); }
        .heat-cell[data-level="2"] { background-color: var(--heat-2); }
        .heat-cell[data-level="3"] { background-color: var(--heat-3); }
        .heat-cell[data-level="4"] { background-color: var(--heat-4); }
        .tooltip { position: absolute; background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 250px; white-space: pre-wrap; word-wrap: break-word; }
        .filter-notice { display: none; justify-content: space-between; align-items: center; background: var(--surface); padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 15px; }
        .log-meta { font-size: 12px; color: #888; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .log-actions { display: flex; gap: 5px; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; font-family: 'Fira Mono', monospace; font-size: 14px; }
        .edit-area { width: 100%; height: 100px; margin-top: 10px; }
        .highlight { background-color: var(--highlight); color: var(--highlight-text); border-radius: 2px; padding: 0 2px; }

        /* OCR Screen */
        #ocrScreen { display: none; }
        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 40px; text-align: center; margin-bottom: 20px; background: var(--surface); transition: border-color 0.2s; }
        .upload-area:hover { border-color: var(--accent); }
        .split-view { display: flex; gap: 20px; margin-top: 20px; align-items: stretch; }
        .split-view > div { flex: 1; width: 50%; display: flex; flex-direction: column; }
        .image-preview-container { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: var(--surface); display: flex; justify-content: center; align-items: center; min-height: 300px; }
        .image-preview-container img { max-width: 100%; max-height: 400px; object-fit: contain; display: none; }
        #ocrResult { height: 100%; min-height: 300px; margin-bottom: 0; }
        .ocr-actions { display: flex; gap: 10px; margin-top: 10px; }
        #ocrLoading { display: none; font-size: 14px; color: var(--accent); margin-top: 10px; font-weight: bold; }

        /* Chat Screen */
        #chatScreen { display: none; height: 70vh; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; }
        .chat-layout { display: flex; height: 100%; }
        .chat-sidebar { width: 250px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); }
        .chat-sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: var(--surface); }
        .chat-item.active { background: var(--surface); border-left: 4px solid var(--accent); font-weight: bold; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--surface); }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; background: var(--bg); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.mine { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.theirs { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 10px; color: #888; margin-bottom: 2px; }
        .msg-bubble { padding: 10px 15px; border-radius: 8px; font-size: 14px; word-wrap: break-word; white-space: pre-wrap; }
        .msg-wrapper.mine .msg-bubble { background: var(--accent); color: var(--bg); border-bottom-right-radius: 0; }
        .msg-wrapper.theirs .msg-bubble { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 0; }
        .msg-time { font-size: 10px; color: #888; margin-top: 2px; }
        
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .chat-input-row { display: flex; gap: 10px; align-items: center; }
        .chat-input-row input[type="text"] { margin-bottom: 0; flex: 1; }
        .attachment-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .attachment-preview { font-size: 12px; color: var(--accent); display: none; align-items: center; gap: 10px; }
        
        /* File Attachments in Chat */
        .chat-img-attachment { max-width: 200px; border-radius: 4px; margin-top: 5px; cursor: pointer; border: 1px solid var(--border); }
        .chat-file-attachment { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-top: 5px; text-decoration: none; color: var(--text); }
        .msg-wrapper.mine .chat-file-attachment { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: var(--bg); }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 20; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); padding: 30px; border-radius: 8px; width: 350px; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; }
        .user-checkbox-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 15px; background: var(--bg); }
        .user-checkbox-list label { display: block; margin-bottom: 5px; cursor: pointer; }
        
        #authScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: var(--surface); padding: 40px; border-radius: 8px; border: 1px solid var(--border); width: 300px; text-align: center; }
        #appScreen { display: none; }

        @media (max-width: 600px) {
            .split-view { flex-direction: column; }
            .split-view > div { width: 100%; }
            .chat-layout { flex-direction: column; }
            .chat-sidebar { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid var(--border); }
            .chat-main { height: 70%; }
        }
    </style>
</head>
<body>

    <div id="tooltip" class="tooltip"></div>

    <!-- Auth Screen -->
    <div id="authScreen">
        <div class="auth-box">
            <h2>Login / Register</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" style="width: 100%; margin-bottom: 10px;">Login</button>
            <button class="btn-secondary" onclick="register()" style="width: 100%;">Register</button>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="container">
        <header>
            <h2>Drop</h2>
            <div class="profile-section">
                <button class="profile-btn" onclick="toggleDropdown()" id="profileName">Profile</button>
                <div class="dropdown" id="profileDropdown">
                    <button onclick="openSettings()">Settings</button>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabLoggerBtn" onclick="switchTab('logger')">Logger</button>
            <button class="tab-btn" id="tabOcrBtn" onclick="switchTab('ocr')">Image to Text</button>
            <button class="tab-btn" id="tabChatBtn" onclick="switchTab('chat')">
                Chat <span id="globalChatBadge" class="badge" style="display: none;">0</span>
            </button>
        </div>

        <!-- ================= LOGGER SCREEN ================= -->
        <div id="loggerScreen">
            <textarea id="logInput" placeholder="Paste text, code, or notes here..."></textarea>
            <div class="controls">
                <button onclick="addLog()">Save Log</button>
                <!-- <button class="btn-secondary" onclick="exportDocument()">Export Polished Document</button> -->
            </div>

            <h2>History</h2>
            
            <div class="accordion">
                <div class="accordion-header" onclick="toggleHeatmap()">
                    <span>Activity Heatmap</span>
                    <span id="heatmapToggleIcon">▼</span>
                </div>
                <div id="heatmapContent" class="accordion-content">
                    <div class="year-selector">
                        <button class="btn-secondary btn-small" onclick="changeYear(-1)">◀</button>
                        <span id="heatmapYearDisplay">2023</span>
                        <button class="btn-secondary btn-small" onclick="changeYear(1)">▶</button>
                    </div>
                    <div id="heatmap" class="heatmap-year-container"></div>
                </div>
            </div>

            <div id="filterNotice" class="filter-notice">
                <span>Showing logs for: <strong id="filterDateText"></strong></span>
                <button class="btn-secondary" style="padding: 5px 10px; font-size: 12px;" onclick="clearFilter()">Clear Filter</button>
            </div>

            <input type="text" id="searchInput" placeholder="Search exact phrases, dates (MM/DD/YYYY), or times...">
            <div id="logContainer"></div>
            <div id="scrollSentinel" style="height: 20px;"></div>
        </div>

        <!-- ================= OCR SCREEN ================= -->
        <div id="ocrScreen">
            <div class="upload-area">
                <label for="ocrImageInput" class="btn-secondary" style="cursor: pointer; padding: 10px 20px; border-radius: 6px; display: inline-block;">
                    Choose Image (PNG/JPG)
                </label>
                <input type="file" id="ocrImageInput" accept="image/png, image/jpeg" style="display: none;" onchange="previewOcrImage(event)">
                <div id="ocrLoading">Extracting text... Please wait.</div>
            </div>

            <div class="split-view">
                <div>
                    <div class="image-preview-container">
                        <span id="ocrPlaceholder">No image selected</span>
                        <img id="ocrImagePreview" alt="Preview">
                    </div>
                    <button id="convertBtn" onclick="performOcr()" style="margin-top: 10px; display: none; width: 100%;">Convert to Text</button>
                </div>
                <div>
                    <textarea id="ocrResult" placeholder="Extracted text will appear here..."></textarea>
                    <div class="ocr-actions">
                        <button class="btn-secondary" onclick="copyOcrText()" style="flex: 1;">Copy Text</button>
                        <button onclick="addOcrToLog()" style="flex: 1;">Add to Log</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= CHAT SCREEN ================= -->
        <div id="chatScreen">
            <div class="chat-layout">
                <!-- Sidebar -->
                <div class="chat-sidebar">
                    <div class="chat-sidebar-header">
                        <span style="font-weight: bold;">Chats</span>
                        <button class="btn-secondary btn-small" onclick="openNewChatModal()">+ New</button>
                    </div>
                    <div class="chat-list" id="chatList">
                        <!-- Chat items injected here -->
                    </div>
                </div>
                
                <!-- Main Chat Area -->
                <div class="chat-main">
                    <div class="chat-header" id="activeChatHeader">Select a chat to start messaging</div>
                    <div class="chat-messages" id="chatMessages">
                        <!-- Messages injected here -->
                    </div>
                    
                    <div class="chat-input-area" id="chatInputArea" style="display: none;">
                        <div class="attachment-preview" id="chatAttachmentPreview">
                            <span id="chatAttachmentName">file.zip</span>
                            <button class="btn-danger" onclick="clearChatAttachment()">X</button>
                        </div>
                        <div class="chat-input-row">
                            <label for="chatFileInput" class="attachment-btn">📎</label>
                            <input type="file" id="chatFileInput" style="display: none;" onchange="handleChatAttachment(event)">
                            
                            <input type="text" id="chatTextInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                            <button id="chatSendBtn" onclick="sendChatMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>Settings</h3>
            
            <!-- New Account Management Section -->
            <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                <h4 style="margin-top: 0; margin-bottom: 10px;">Account</h4>
                <input type="text" id="editUsername" placeholder="New Username">
                <input type="password" id="editPassword" placeholder="New Password">
                <button onclick="updateAccount()" style="width: 100%; margin-bottom: 10px;">Update Account</button>
                <button class="btn-danger" onclick="deleteAccount()" style="width: 100%;">Delete Account</button>
            </div>

            <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                Dark Mode
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
            </label>
            <button class="btn-secondary" onclick="closeSettings()" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- New Chat Modal -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <h3>New Chat / Group</h3>
            <input type="text" id="groupNameInput" placeholder="Group Name (Optional for 1-on-1)">
            <div class="user-checkbox-list" id="userCheckboxList">
                <!-- Users injected here -->
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="createNewChat()" style="flex: 1;">Create</button>
                <button class="btn-secondary" onclick="closeNewChatModal()" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- Global State ---
        let currentUser = JSON.parse(localStorage.getItem('minimal_user'));
        let logs = [];
        let selectedDateFilter = null;
        let currentHeatmapYear = new Date().getFullYear();
        let displayLimit = 10;
        const loadChunk = 10;
        
        // Chat State
        let socket = null;
        let activeConversationId = null;
        let chatFileToUpload = null;

        // --- Initialization ---
        if (localStorage.getItem('minimal_theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').checked = true;
        }

        if (currentUser) showApp();

        // --- Auth System ---
        async function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
            if (res.ok) alert("Registered! You can now log in."); else alert("Username already exists.");
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
            if (res.ok) {
                currentUser = await res.json();
                localStorage.setItem('minimal_user', JSON.stringify(currentUser));
                showApp();
            } else alert("Invalid credentials.");
        }

        function logout() {
            localStorage.removeItem('minimal_user');
            currentUser = null;
            if(socket) socket.disconnect();
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('authScreen').style.display = 'flex';
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('profileName').innerText = currentUser.username;
            fetchLogs();
            initSocket();
            loadConversations();
        }

        // --- UI & Settings ---
        function toggleDropdown() { document.getElementById('profileDropdown').classList.toggle('active'); }
        function openSettings() { 
            document.getElementById('settingsModal').classList.add('active'); 
            document.getElementById('profileDropdown').classList.remove('active'); 
            
            // Pre-fill the username, but leave password blank for security
            document.getElementById('editUsername').value = currentUser.username;
            document.getElementById('editPassword').value = ''; 
        }

        async function updateAccount() {
            const newUsername = document.getElementById('editUsername').value.trim();
            const newPassword = document.getElementById('editPassword').value.trim();
            
            if (!newUsername || !newPassword) return alert("Username and password cannot be empty.");

            const res = await fetch('/api/users', {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify({ username: newUsername, password: newPassword })
            });

            if (res.ok) {
                alert("Account updated successfully!");
                currentUser.username = newUsername;
                localStorage.setItem('minimal_user', JSON.stringify(currentUser));
                document.getElementById('profileName').innerText = currentUser.username;
                closeSettings();
            } else {
                const data = await res.json();
                alert(data.error || "Failed to update account.");
            }
        }

        async function deleteAccount() {
            if (!confirm("WARNING: This will permanently delete your account and all your logs. Your chat messages will remain for others to see. Proceed?")) return;
            if (!confirm("Are you absolutely sure? This cannot be undone.")) return;

            await fetch('/api/users', { method: 'DELETE', headers: getHeaders() });
            alert("Account deleted.");
            closeSettings();
            logout();
        }
        function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
        function toggleTheme() {
            if (document.getElementById('themeToggle').checked) { document.body.classList.add('dark-mode'); localStorage.setItem('minimal_theme', 'dark'); } 
            else { document.body.classList.remove('dark-mode'); localStorage.setItem('minimal_theme', 'light'); }
        }
        window.onclick = function(e) { if (!e.target.matches('.profile-btn')) document.getElementById('profileDropdown').classList.remove('active'); }

        function switchTab(tab) {
            document.getElementById('loggerScreen').style.display = tab === 'logger' ? 'block' : 'none';
            document.getElementById('ocrScreen').style.display = tab === 'ocr' ? 'block' : 'none';
            document.getElementById('chatScreen').style.display = tab === 'chat' ? 'block' : 'none';
            
            document.getElementById('tabLoggerBtn').classList.toggle('active', tab === 'logger');
            document.getElementById('tabOcrBtn').classList.toggle('active', tab === 'ocr');
            document.getElementById('tabChatBtn').classList.toggle('active', tab === 'chat');
        }

        // --- Logger System ---
        function getHeaders() { return { 'Content-Type': 'application/json', 'x-user-id': currentUser.id }; }

        async function fetchLogs() {
            const res = await fetch('/api/logs', { headers: getHeaders() });
            logs = await res.json();
            if(document.getElementById('heatmapContent').classList.contains('active')) renderHeatmap();
            renderLogs(document.getElementById('searchInput').value);
        }

        async function addLog() {
            const input = document.getElementById('logInput').value;
            if (!input.trim()) return;
            const now = new Date();
            await fetch('/api/logs', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ text: input, date: now.toLocaleDateString(), time: now.toLocaleTimeString(), timestamp: Date.now() }) });
            document.getElementById('logInput').value = '';
            fetchLogs();
        }

        async function deleteLog(id) {
            if (!confirm("Delete this log?")) return;
            await fetch(`/api/logs/${id}`, { method: 'DELETE', headers: getHeaders() });
            fetchLogs();
        }

        function editLog(id) {
            const log = logs.find(l => l.id === id);
            document.getElementById(`log-content-${id}`).innerHTML = `
                <textarea id="edit-input-${id}" class="edit-area">${log.text}</textarea>
                <button class="btn-edit" onclick="saveEdit(${id})" style="margin-top: 5px;">Save</button>
                <button class="btn-secondary" onclick="renderLogs()" style="margin-top: 5px; padding: 5px 10px; font-size: 12px;">Cancel</button>
            `;
        }

        async function saveEdit(id) {
            const newText = document.getElementById(`edit-input-${id}`).value;
            await fetch(`/api/logs/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ text: newText }) });
            fetchLogs();
        }

        // --- Heatmap & Infinite Scroll ---
        function toggleHeatmap() {
            const content = document.getElementById('heatmapContent');
            const icon = document.getElementById('heatmapToggleIcon');
            if (content.classList.contains('active')) { content.classList.remove('active'); icon.innerText = '▼'; } 
            else { content.classList.add('active'); icon.innerText = '▲'; renderHeatmap(); }
        }

        function changeYear(delta) { currentHeatmapYear += delta; renderHeatmap(); }

        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            container.innerHTML = '';
            document.getElementById('heatmapYearDisplay').innerText = currentHeatmapYear;
            
            const logsByDate = {};
            logs.forEach(l => { if(!logsByDate[l.date]) logsByDate[l.date] = []; logsByDate[l.date].push(l); });

            for (let month = 0; month < 12; month++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'heatmap-month';
                const daysInMonth = new Date(currentHeatmapYear, month + 1, 0).getDate();
                const firstDayOfWeek = new Date(currentHeatmapYear, month, 1).getDay();
                
                for (let i = 0; i < firstDayOfWeek; i++) {
                    const empty = document.createElement('div'); empty.className = 'heat-cell empty'; monthDiv.appendChild(empty);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const d = new Date(currentHeatmapYear, month, day);
                    const dateStr = d.toLocaleDateString();
                    const dayLogs = logsByDate[dateStr] || [];
                    const count = dayLogs.length;
                    
                    let level = 0;
                    if(count === 1) level = 1; else if(count === 2) level = 2; else if(count >= 3 && count <= 4) level = 3; else if(count > 4) level = 4;

                    const cell = document.createElement('div');
                    cell.className = 'heat-cell';
                    if(level > 0) cell.setAttribute('data-level', level);
                    
                    let previewText = `${dateStr}: ${count} logs\n`;
                    if(count > 0) {
                        previewText += dayLogs.slice(0, 3).map(l => '- ' + l.text.substring(0, 25).replace(/\n/g, ' ') + '...').join('\n');
                        if(count > 3) previewText += `\n...and ${count - 3} more`;
                    } else previewText += "No logs";

                    cell.onmouseover = (e) => { const tt = document.getElementById('tooltip'); tt.innerText = previewText; tt.style.display = 'block'; tt.style.left = e.pageX + 15 + 'px'; tt.style.top = e.pageY + 15 + 'px'; };
                    cell.onmouseout = () => document.getElementById('tooltip').style.display = 'none';
                    cell.onclick = () => { if(count > 0) { selectedDateFilter = dateStr; displayLimit = 10; renderLogs(document.getElementById('searchInput').value); } };
                    monthDiv.appendChild(cell);
                }
                container.appendChild(monthDiv);
            }
        }

        function clearFilter() { selectedDateFilter = null; renderLogs(document.getElementById('searchInput').value); }
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])); }
        function highlightText(text, query) {
            const escapedText = escapeHTML(text);
            if (!query) return escapedText;
            return escapedText.replace(new RegExp(`(${escapeHTML(query)})`, 'gi'), '<span class="highlight">$1</span>');
        }

        function renderLogs(query = '') {
            const container = document.getElementById('logContainer');
            container.innerHTML = '';
            let filteredLogs = logs;

            if (selectedDateFilter) {
                filteredLogs = filteredLogs.filter(l => l.date === selectedDateFilter);
                document.getElementById('filterNotice').style.display = 'flex';
                document.getElementById('filterDateText').innerText = selectedDateFilter;
            } else document.getElementById('filterNotice').style.display = 'none';

            filteredLogs = filteredLogs.filter(l => l.text.toLowerCase().includes(query.toLowerCase()) || l.date.includes(query) || l.time.includes(query));
            const logsToRender = filteredLogs.slice(0, displayLimit);

            logsToRender.forEach(l => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `
                    <div class="log-meta">
                        <span>${highlightText(l.date, query)} at ${highlightText(l.time, query)}</span>
                        <div class="log-actions">
                            <button class="btn-edit" onclick="editLog(${l.id})">Edit</button>
                            <button class="btn-danger" onclick="deleteLog(${l.id})">Delete</button>
                        </div>
                    </div>
                    <div id="log-content-${l.id}"><pre>${highlightText(l.text, query)}</pre></div>
                `;
                container.appendChild(div);
            });

            document.getElementById('scrollSentinel').style.display = filteredLogs.length > displayLimit ? 'block' : 'none';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => { displayLimit = 10; renderLogs(e.target.value); });
        const observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) { displayLimit += loadChunk; renderLogs(document.getElementById('searchInput').value); } }, { rootMargin: "100px" });
        observer.observe(document.getElementById('scrollSentinel'));

        function exportDocument() {
            if (logs.length === 0) return alert("No logs to export.");
            let docContent = `# Polished Log Document\nUser: ${currentUser.username}\nGenerated on: ${new Date().toLocaleString()}\n\n---\n\n`;
            [...logs].sort((a, b) => a.timestamp - b.timestamp).forEach(l => { docContent += `### ${l.date} - ${l.time}\n\n\`\`\`text\n${l.text}\n\`\`\`\n\n---\n\n`; });
            const blob = new Blob([docContent], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${currentUser.username}_Logs_${Date.now()}.md`; a.click(); URL.revokeObjectURL(url);
        }

        // --- OCR Logic ---
        let currentOcrFile = null;
        function previewOcrImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentOcrFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('ocrImagePreview');
                img.src = e.target.result; img.style.display = 'block';
                document.getElementById('ocrPlaceholder').style.display = 'none';
                document.getElementById('convertBtn').style.display = 'block';
                document.getElementById('ocrResult').value = '';
            }
            reader.readAsDataURL(file);
        }

        async function performOcr() {
            if (!currentOcrFile) return;
            const loadingText = document.getElementById('ocrLoading');
            const convertBtn = document.getElementById('convertBtn');
            loadingText.style.display = 'block'; convertBtn.disabled = true; convertBtn.innerText = 'Converting...';
            try {
                const result = await Tesseract.recognize(currentOcrFile, 'eng');
                document.getElementById('ocrResult').value = result.data.text;
            } catch (error) { alert("Error extracting text."); } 
            finally { loadingText.style.display = 'none'; convertBtn.disabled = false; convertBtn.innerText = 'Convert to Text'; }
        }

        function copyOcrText() {
            const text = document.getElementById('ocrResult').value;
            if (!text) return alert("No text to copy!");
            navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
        }

        function addOcrToLog() {
            const text = document.getElementById('ocrResult').value;
            if (!text.trim()) return alert("No text to add!");
            switchTab('logger');
            const logInput = document.getElementById('logInput');
            logInput.value = text; logInput.focus();
        }

        // ==========================================
        // CHAT & SOCKET.IO LOGIC
        // ==========================================
        function initSocket() {
            socket = io();
            socket.emit('register', currentUser.id);

            socket.on('receive_message', (msg) => {
                if (msg.conversation_id === activeConversationId) {
                    appendMessageToUI(msg);
                    scrollToBottom();
                    // Mark as read immediately since we are looking at it
                    fetch(`/api/conversations/${activeConversationId}/read`, { method: 'POST', headers: getHeaders() });
                }
            });

            socket.on('new_message_notification', () => loadConversations());

            socket.on('chat_deleted_notification', (convId) => {
                if (activeConversationId === convId) {
                    clearActiveChat();
                    alert("This chat was deleted.");
                }
                loadConversations();
            });
        }

        async function loadConversations() {
            const res = await fetch('/api/conversations', { headers: getHeaders() });
            const convos = await res.json();
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            
            let totalUnread = 0;

            convos.forEach(c => {
                totalUnread += c.unread_count;

                const div = document.createElement('div');
                div.className = `chat-item ${c.id === activeConversationId ? 'active' : ''}`;
                
                const title = c.is_group ? `👥 ${c.name}` : `👤 ${c.other_user}`;
                const badgeHtml = c.unread_count > 0 && c.id !== activeConversationId ? `<span class="badge">${c.unread_count}</span>` : '';
                
                div.innerHTML = `<span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</span> ${badgeHtml}`;
                div.onclick = () => selectConversation(c.id, title, c.is_group, c.admin_id, div);
                list.appendChild(div);
            });

            // Update the global tab badge
            const globalBadge = document.getElementById('globalChatBadge');
            if (totalUnread > 0) {
                globalBadge.innerText = totalUnread;
                globalBadge.style.display = 'inline-block';
            } else {
                globalBadge.style.display = 'none';
            }
        }

        async function selectConversation(id, title, isGroup, adminId, clickedEl) {
            activeConversationId = id;
            
            // Mark as read in the database
            await fetch(`/api/conversations/${id}/read`, { method: 'POST', headers: getHeaders() });
            loadConversations(); // Refresh sidebar to clear the badge
            
            const header = document.getElementById('activeChatHeader');
            header.style.display = 'flex';
            header.style.justifyContent = 'space-between';
            header.style.alignItems = 'center';
            
            let buttonsHtml = `<div style="display:flex; gap:5px;">`;
            if (isGroup) {
                buttonsHtml += `<button class="btn-secondary btn-small" onclick="leaveChat()">Leave</button>`;
                if (currentUser.id === adminId) {
                    buttonsHtml += `<button class="btn-danger btn-small" onclick="deleteChat()">Delete Group</button>`;
                }
            } else {
                buttonsHtml += `<button class="btn-danger btn-small" onclick="deleteChat()">Delete Chat</button>`;
            }
            buttonsHtml += `</div>`;
            
            header.innerHTML = `<span>${title}</span> ${buttonsHtml}`;
            document.getElementById('chatInputArea').style.display = 'flex';
            
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            if (clickedEl) clickedEl.classList.add('active');

            socket.emit('join_conversation', id);

            const res = await fetch(`/api/messages/${id}`);
            const messages = await res.json();
            
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            messages.forEach(appendMessageToUI);
            scrollToBottom();
        }

        async function leaveChat() {
            if (!confirm("Are you sure you want to leave this group?")) return;
            await fetch(`/api/conversations/${activeConversationId}/leave`, { method: 'POST', headers: getHeaders() });
            clearActiveChat();
            loadConversations();
        }

        async function deleteChat() {
            if (!confirm("Are you sure you want to permanently delete this chat for EVERYONE?")) return;
            
            const res = await fetch(`/api/conversations/${activeConversationId}`, { method: 'DELETE', headers: getHeaders() });
            
            if (!res.ok) {
                const data = await res.json();
                return alert(data.error || "Failed to delete chat.");
            }
            
            socket.emit('chat_deleted', activeConversationId); 
            clearActiveChat();
            loadConversations();
        }

        function clearActiveChat() {
            activeConversationId = null;
            const header = document.getElementById('activeChatHeader');
            header.innerHTML = 'Select a chat to start messaging';
            header.style.display = 'block';
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatInputArea').style.display = 'none';
        }

        async function openNewChatModal() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const list = document.getElementById('userCheckboxList');
            list.innerHTML = '';
            
            users.forEach(u => {
                if(u.id === currentUser.id) return;
                list.innerHTML += `<label><input type="checkbox" value="${u.id}"> ${u.username}</label>`;
            });
            document.getElementById('newChatModal').classList.add('active');
        }

        function closeNewChatModal() {
            document.getElementById('newChatModal').classList.remove('active');
            document.getElementById('groupNameInput').value = '';
        }

        async function createNewChat() {
            const checkboxes = document.querySelectorAll('#userCheckboxList input:checked');
            const selectedIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
            if(selectedIds.length === 0) return alert("Select at least one user.");
            
            const isGroup = selectedIds.length > 1;
            const name = document.getElementById('groupNameInput').value;
            if(isGroup && !name.trim()) return alert("Please provide a group name.");

            selectedIds.push(currentUser.id); // Add myself

            const res = await fetch('/api/conversations', {
                method: 'POST', headers: getHeaders(),
                body: JSON.stringify({ is_group: isGroup, name: name, participant_ids: selectedIds })
            });
            
            const data = await res.json();
            
            if (data.exists) {
                alert("A chat with this user already exists.");
            }
            
            closeNewChatModal();
            loadConversations();
        }

        function handleChatAttachment(event) {
            const file = event.target.files[0];
            if(!file) return;
            chatFileToUpload = file;
            document.getElementById('chatAttachmentName').innerText = file.name;
            document.getElementById('chatAttachmentPreview').style.display = 'flex';
        }

        function clearChatAttachment() {
            chatFileToUpload = null;
            document.getElementById('chatFileInput').value = '';
            document.getElementById('chatAttachmentPreview').style.display = 'none';
        }

        async function sendChatMessage() {
            const textInput = document.getElementById('chatTextInput');
            const text = textInput.value.trim();
            const sendBtn = document.getElementById('chatSendBtn');
            
            if (!text && !chatFileToUpload) return;

            sendBtn.disabled = true;
            sendBtn.innerText = 'Sending...';

            let fileUrl = null;
            let fileName = null;

            // 1. Upload file if exists (Handles GBs via Multer stream)
            if (chatFileToUpload) {
                const formData = new FormData();
                formData.append('file', chatFileToUpload);
                
                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    fileUrl = data.file_url;
                    fileName = data.file_name;
                } catch (e) {
                    alert("File upload failed.");
                    sendBtn.disabled = false;
                    sendBtn.innerText = 'Send';
                    return;
                }
            }

            // 2. Send message via Socket
            const msgData = {
                conversation_id: activeConversationId,
                sender_id: currentUser.id,
                text: text,
                file_url: fileUrl,
                file_name: fileName,
                timestamp: Date.now()
            };

            socket.emit('send_message', msgData);

            // Cleanup UI
            textInput.value = '';
            clearChatAttachment();
            sendBtn.disabled = false;
            sendBtn.innerText = 'Send';
        }

        function appendMessageToUI(msg) {
            const container = document.getElementById('chatMessages');
            const isMine = msg.sender_id === currentUser.id;
            const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            let contentHtml = '';
            if (msg.text) contentHtml += `<div>${escapeHTML(msg.text)}</div>`;
            
            if (msg.file_url) {
                const ext = msg.file_name.split('.').pop().toLowerCase();
                if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
                    contentHtml += `<img src="${msg.file_url}" class="chat-img-attachment" onclick="window.open('${msg.file_url}', '_blank')">`;
                } else {
                    contentHtml += `
                        <a href="${msg.file_url}" download="${msg.file_name}" class="chat-file-attachment">
                            📄 ${escapeHTML(msg.file_name)} ⬇️
                        </a>
                    `;
                }
            }

            const div = document.createElement('div');
            div.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`;
            div.innerHTML = `
                ${!isMine ? `<div class="msg-sender">${escapeHTML(msg.username)}</div>` : ''}
                <div class="msg-bubble">${contentHtml}</div>
                <div class="msg-time">${timeStr}</div>
            `;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
